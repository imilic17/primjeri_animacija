<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt forma</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: linear-gradient(135deg, #e8f4f8, #f0f4f8, #e8e8f8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 40px;
            height: 100%;
            background: linear-gradient(-45deg,#000000,#CB0FFF,#FF00FF,#00FFFF,#4DEEEA,#74EE15);
            background-size: 600% 600%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 25%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .loaderBg{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 2rem;
            animation: fadeOut 3s forwards;
            z-index: 2;
        }
        @keyframes fadeOut{
            0% {opacity: 1;}
            75% {opacity: 1;}
            100% {opacity: 0; pointer-events: none;}
        }
        .progress-bar {
            width: 200px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar::after {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            border-radius: 3px;
            animation: progress 1.5s ease-in-out infinite;
        }
        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
        .login-card{
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        .login-card h2{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group{
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input{
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background: transparent;
        }
        .input-group label{
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.6s ease;
            background: white;
            padding: 0 5px;
        }
        .input-group input:focus,
        .input-group input:valid{
            border-color: #1a73e8;
        }
        .input-group input:focus + label,
        .input-group input:valid + label{
            top: 0;
            font-size: 0.8rem;
            color: #1a73e8;
        }
        .input-group::after{
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #1a73e8, #1557b0);
            transition: all 0.3s ease;
        }
        .input-group:focus-within::after{
            left: 0;
            width: 100%;
        }
        .submit-btn{
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #FF5A00, #f442d6);  
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .submit-btn:hover{
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(26, 115, 232, 0.4);
        }
        .submit-btn:active{
            transform: translateY(0);
        }
        .submit-btn::after{
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        .submit-btn:active::after{
            width: 300px;
            height: 300px;
        }
        .checkbox-group{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .checkbox-group input[type="checkbox"]{
            
        }
        .checkbox-group .checkmark{
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .checkbox-group input:checked + .checkmark{
            background: linear-gradient(90deg, #1a73e8, #1557b0);
            border-color: #1a73e8;
            animation: checkPop 0.3s ease;
        }
        @keyframes checkPop{
            0% { transform: scale(1);}
            50% { transform: scale(1.2);}
            100% { transform: scale(1);}
        }
        .checkbox-group .checkmark::after{
            content: '✓';
            color: white;
            font-size: 14px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }
        .checkbox-group input:checked + .checkmark::after{
            opacity: 1;
            transform: scale(1);
        }
        .checkbox-group label{
            color: #666;
            cursor: pointer;
        }
        .input-group.error input{
            border-color: #ff416c;
            animation: shake 0.5s ease;
        }

        .input-group.error label{
            color: #ff416c;
        }
        @keyframes shake{
            0%, 100% { transform: translateX(0);}
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px);}
            20%, 40%, 60%, 80% { transform: translateX(5px);}
        }
        @keyframes popIn{
            0% { transform: translateY(-50%) scale(0);}
            50% { transform: translateY(-50%) scale(1.3);}
            100% { transform: translateY(-50%) scale(1);}
        }
        .forgot-link{
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgb(77, 77, 77);
            text-decoration: none;
            position: relative;
        }
        .forgot-link::after{
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #1ae82b;
            transition: all 0.3s ease;
        }
        .forgot-link:hover::after{
            left: 0;
            width: 100%;
        }
        @media (max-width: 480px){
            body{
                padding: 20px;
            }
            .login-card{
                padding: 25px;
            }
            .login-card h2{
                font-size: 1.3rem;
            }
        }
        @media (prefers-reduced-motion: reduce){
            .input-group input,
            .input-group label,
            .input-group::after,
            .submit-btn,
            .submit-btn::after,
            .checkbox-group .checkmark,
            .checkbox-group .checkmark::after,
            .forgot-link::after,
            .input-group.error input{
                animation: none;
                transition: none;
            }
        }
        .nazad{
            font-family: Arial, Helvetica, sans-serif;
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: transparent;
            border: 1px solid black;
            border: none;
            font-size: 1rem;
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <header>
    <div class="loaderBg">
        <div class="loader-container">
            <p>Učitavanje...</p> <br>
            <div class="progress-bar"></div>
        </div>
    </div>
</header>
        <a href="promo.html" class="nazad">Nazad</a>
    <div class="login-card">
        <h2>Prijava</h2>
        <form>
            <div class="input-group success">
                <input type="email" id="email" required>
                <label for="email">Email adresa</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label for="password">Lozinka</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember">
                <label for="remember">Zapamti me</label>
            </div>
            <button type="button" class="submit-btn">Prijavi se</button>
            <a href="#" class="forgot-link">Zaboravili ste lozinku?</a>
        </form>
    </div>
</body>
</html>
