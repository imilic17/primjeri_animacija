<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aplikacija</title>

    <style> body {
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
    }
    @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        section{
            display: inline-block;
            width: 100%;
            height: 100%;
        }

        h1{
            text-align: center;
            font-size: 5rem;
            color: #fff;
            text-shadow:
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #0ff;
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 10px #0ff,
                    0 0 20px #0ff,
                    0 0 40px #0ff,
                    0 0 80px #0ff;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        .opis{
            font-size: 2.5rem;
            text-align: center;
            color: #0f0;
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid #0f0;
            width: 0;
            animation:
                typing 3.5s steps(25, end) forwards,
                blink 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: #0f0; }
        }


        .Cristiano{
            
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: rgb(136, 0, 163);
            background: linear-gradient(45deg, #e1e6e7, #daf0ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(0, 212, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0);
            }
        }


        .Ronaldo{
            
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: rgb(136, 0, 163);
            background: linear-gradient(45deg, #e1e6e7, #daf0ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(0, 212, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0);
            }
        }


        .buttoni{
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .kartice{
            display: flex;
            justify-content: center;
            text-align: center;
            gap: 50px;
            margin:auto;
            padding: 5px;
            height: 100px;
            width: 900px;
        }


         .R{
            
            width: 200px;

            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            color: rgb(47, 146, 238);
        }

        .R:hover {
            transform: translateY(-20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .R-img {
            width: 50%;
            height: 80px;

        }

        .M{
