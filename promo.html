<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        button {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        button:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .pozadina{
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 800% 800%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient{
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        section {
            min-height: 200vh;               
        }
        .neon-text {
            font-size: 5rem;               
            color: #1a5fb4;              
            text-shadow:
                0 0 10px #3584e4,        
                0 0 20px #3584e4,          
                0 0 40px #3584e4,         
                0 0 80px #3584e4;        
            animation: flicker 1.5s infinite alternate;
        }
        @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
        }
        .button1 {
            height: 50px;
            width: 100px;
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        cursor: pointer;
        }
        .social-icons-v3 {
            display: flex;
            gap: 20px;
        }
        .social-icons-v3 a {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: #fff;
            background: #64748b;
            border-radius: 50%;
            text-decoration: none;
            position: center;            
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .social-icons-v3 a::after {
            content: attr(data-name);
            position: absolute;
            bottom: -40px;               
            background: #fff;
            color: #333;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            opacity: 0;                    
            transform: translateY(-10px);  
            transition: all 0.3s ease;
            white-space: nowrap;    
        }
        .social-icons-v3 a:hover::after {
            opacity: 1;
            transform: translateY(0);
        }
        .social-icons-v3 a:hover {
            transform: translateY(-10px);
        }
        .social-icons-v3 a.facebook:hover { background: #1877f2; box-shadow: 0 10px 30px #1877f2; 
        }
        .card.kartice {
            width: 200px;
            height: 350px;
            background: white;
            border-radius: 20px;
            overflow: hidden;            
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            cursor: pointer;
            display: inline-block;
        }

        .card.kartice:hover {
            transform: translateY(-20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .card.kartice-img {
            width: 100%;
            height: 180px;
            background: linear-gradient(45deg, #1a73e8, #4285f4); 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;               
        }

        .card.kartice-content {
            padding: 20px;
        }

        .card.kartice-content h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .card.kartice-content p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;             
        }
        .card{display: inline-block; }

        
       
    </style>
</head>
<body>
    <section class="pozadina">
    <div class="container"></div>    
    <h1 class="neon-text">GAPKO</h1>
    </div>
    <p>Cody Gakpo zvan Gapko...</p>
    <button class="button1">Cody</button>
    <button class="button1">Gakpo</button>
    <br><br>
    <div class="card">
        <div class="kartice"><h3>Cody Mathès Gakpo rođen 7. svibnja 1999. je nizozemski profesionalni nogometaš koji igra kao lijevo krilo ili središnji napadač za klub Liverpool i nizozemsku reprezentaciju .</h3></div>
        <div class="kartice"><h3>PSV 106 utakmica, 36 golova</h3></div>
        <div class="kartice"><h3>LIVERPOOL 118 utakmica, 31 gol</h3></div>
    </div>
    <div></div>

        
      
    </section>
</body>
</html>
