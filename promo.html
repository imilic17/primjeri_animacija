<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Crossing</title>

<style>

body {
    background-color: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

    .gradient-bg {
    background: linear-gradient(-45deg,#92e0f3,#a0cff5,#a0facd,#a5f3a9);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    width:100%;
    height:100vh;
    position:fixed;
    z-index:-1;
}

                @keyframes gradient {
        0% {background-position:0% 50%;}
        50% {background-position:100% 50%;}
100% {background-position:0% 50%;}
}


            .neon-text {
         font-size:5rem;
        color:#e2935e;
    text-shadow:
    0 0 10px #dfeb78,
    0 0 20px #3584e4,
    0 0 40px #3584e4,
    0 0 80px #3584e4;
    animation:flicker 1.5s infinite alternate;
        }

    @keyframes flicker {
0%{opacity:1;}
100%{opacity:0.8;}
}



    .btn-play{
font-size:20px;
font-weight:bold;
text-transform:uppercase;
color:white;
background:linear-gradient(45deg,#1a73e8,#4285f4);
width:300px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
animation:pulse 2s infinite;
margin:10px;
}

    .btn1-play{
font-size:20px;
font-weight:bold;
text-transform:uppercase;
color:white;
background:linear-gradient(45deg,#ff9966,#ff5e62);
width:300px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
animation:pulse 2s infinite;
margin:10px;
}

    @keyframes pulse {
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}



.cards{
display:flex;
gap:30px;
margin-top:50px;
}

    .card{
background:white;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

    .card:hover{
transform:translateY(-10px);
box-shadow:0 15px 30px rgba(0,0,0,0.3);
background:#e8f8f5;
}



    footer{
margin-top:60px;
font-size:30px;
}
.social-icons-v4 {
            display: flex;
            gap: 15px;

            
        }

        .social-icons-v4 a {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
           
            font-size: 1.3rem;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
        }

 
        .social-icons-v4 a:hover {
            animation: bounce 0.5s ease;
        }


        @keyframes bounce {
            0%, 100% { transform: translateY(0); }     
            25% { transform: translateY(-15px); }       
            50% { transform: translateY(-5px); }       
            75% { transform: translateY(-10px); }      
         
        }

</style>
</head>

<body>

<div class="gradient-bg"></div>

<h1 class="neon-text">Animal Crossing</h1>

<button class="btn-play">Play Game</button>
<button class="btn1-play">Watch Trailer</button>

<div class="cards">

<div class="card">
<h3>Meet the crew</h3>
<p>A lot of new characters added</p>
</div>

<div class="card">
<h3>DLC</h3>
<p>Get into new advanture</p>
</div>

<div class="card">
<h3>Offical website</h3>
<p>Info</p>
</div>

</div>

<footer class="social-icons-v4">
    <a href="#" class="facebook"><img src="https://img.icons8.com/?size=100&id=NZKqxR4vtXIJ&format=png&color=000000"></a>
    <a href="#" class="instagram"> <a href="promo-hartl.html"><img src="https://img.icons8.com/?size=100&id=Xy10Jcu1L2Su&format=png&color=000000"></a>
    <a href="#" class="youtube"><img src="https://img.icons8.com/?size=100&id=19318&format=png&color=000000"></a>
</footer>

</body>
</html>
